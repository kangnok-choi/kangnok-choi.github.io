<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ihbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="1" stop-color="#dbe6f7"/>
    </linearGradient>
    <pattern id="ihdots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e4ea3" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="240" fill="url(#ihbg)"/>
  <rect width="1200" height="240" fill="url(#ihdots)"/>

  <!-- world grid : a latent world model as a wire globe -->
  <g transform="translate(880, 120)" fill="none" stroke="#1e4ea3" stroke-linecap="round">
    <circle r="86" stroke-opacity="0.5" stroke-width="1.4"/>
    <g stroke-opacity="0.32" stroke-width="1">
      <ellipse rx="30" ry="86"/>
      <ellipse rx="60" ry="86"/>
      <ellipse rx="86" ry="30"/>
      <ellipse rx="86" ry="60"/>
    </g>
  </g>

  <!-- predicted trajectory sweeping into the world -->
  <g fill="none" stroke="#1e4ea3" stroke-width="1.4" stroke-opacity="0.6" stroke-linecap="round" stroke-dasharray="4 5">
    <path d="M 660 190 Q 760 60 880 120"/>
  </g>
  <g fill="#1e4ea3">
    <circle cx="660" cy="190" r="6" fill-opacity="0.55"/>
    <circle cx="740" cy="118" r="5" fill-opacity="0.45"/>
    <circle cx="880" cy="120" r="10" fill-opacity="0.9"/>
  </g>
</svg>
