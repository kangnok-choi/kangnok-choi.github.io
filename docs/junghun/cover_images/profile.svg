<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ihpbg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="1" stop-color="#dbe6f7"/>
    </linearGradient>
    <pattern id="ihpdots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e4ea3" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="480" height="480" fill="url(#ihpbg)"/>
  <rect width="480" height="480" fill="url(#ihpdots)"/>

  <!-- wire globe filling the square -->
  <g transform="translate(240, 240)" fill="none" stroke="#1e4ea3" stroke-linecap="round">
    <circle r="180" stroke-opacity="0.5" stroke-width="1.5"/>
    <g stroke-opacity="0.3" stroke-width="1.1">
      <ellipse rx="62"  ry="180"/>
      <ellipse rx="124" ry="180"/>
      <ellipse rx="180" ry="62"/>
      <ellipse rx="180" ry="124"/>
      <line x1="-180" y1="0" x2="180" y2="0"/>
      <line x1="0" y1="-180" x2="0" y2="180"/>
    </g>
  </g>

  <!-- predicted trajectory sweeping across -->
  <g fill="none" stroke="#1e4ea3" stroke-width="1.6" stroke-opacity="0.55" stroke-linecap="round" stroke-dasharray="5 6">
    <path d="M 60 400 Q 200 120 430 90"/>
  </g>
  <g fill="#1e4ea3">
    <circle cx="60"  cy="400" r="7" fill-opacity="0.55"/>
    <circle cx="430" cy="90"  r="9" fill-opacity="0.85"/>
  </g>
</svg>
