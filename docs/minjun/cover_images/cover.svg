<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mjbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="1" stop-color="#dbe6f7"/>
    </linearGradient>
    <pattern id="mjdots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e4ea3" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="240" fill="url(#mjbg)"/>
  <rect width="1200" height="240" fill="url(#mjdots)"/>

  <!-- layered network: nodes wired across three columns -->
  <g stroke="#1e4ea3" stroke-width="1.1" stroke-opacity="0.4" fill="none" stroke-linecap="round">
    <path d="M 700 60  L 860 50"/>
    <path d="M 700 60  L 860 120"/>
    <path d="M 700 120 L 860 50"/>
    <path d="M 700 120 L 860 120"/>
    <path d="M 700 120 L 860 190"/>
    <path d="M 700 180 L 860 120"/>
    <path d="M 700 180 L 860 190"/>
    <path d="M 860 50  L 1030 90"/>
    <path d="M 860 120 L 1030 90"/>
    <path d="M 860 120 L 1030 160"/>
    <path d="M 860 190 L 1030 160"/>
  </g>
  <g fill="#1e4ea3">
    <circle cx="700"  cy="60"  r="8" fill-opacity="0.55"/>
    <circle cx="700"  cy="120" r="8" fill-opacity="0.55"/>
    <circle cx="700"  cy="180" r="8" fill-opacity="0.55"/>
    <circle cx="860"  cy="50"  r="9" fill-opacity="0.85"/>
    <circle cx="860"  cy="120" r="9" fill-opacity="0.85"/>
    <circle cx="860"  cy="190" r="9" fill-opacity="0.85"/>
    <circle cx="1030" cy="90"  r="8" fill-opacity="0.55"/>
    <circle cx="1030" cy="160" r="8" fill-opacity="0.55"/>
  </g>
</svg>
