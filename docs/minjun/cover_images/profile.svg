<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mjpbg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="1" stop-color="#dbe6f7"/>
    </linearGradient>
    <pattern id="mjpdots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e4ea3" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="480" height="480" fill="url(#mjpbg)"/>
  <rect width="480" height="480" fill="url(#mjpdots)"/>

  <!-- node lattice filling the square -->
  <g stroke="#1e4ea3" stroke-width="1.3" stroke-opacity="0.4" fill="none" stroke-linecap="round">
    <path d="M 80 100 L 240 70"/>
    <path d="M 240 70 L 400 120"/>
    <path d="M 80 100 L 150 240"/>
    <path d="M 240 70 L 150 240"/>
    <path d="M 240 70 L 310 220"/>
    <path d="M 400 120 L 310 220"/>
    <path d="M 400 120 L 410 300"/>
    <path d="M 150 240 L 310 220"/>
    <path d="M 150 240 L 90 380"/>
    <path d="M 310 220 L 410 300"/>
    <path d="M 310 220 L 250 390"/>
    <path d="M 410 300 L 250 390"/>
    <path d="M 90 380 L 250 390"/>
    <path d="M 250 390 L 390 410"/>
  </g>
  <g fill="#1e4ea3">
    <circle cx="80"  cy="100" r="9"  fill-opacity="0.6"/>
    <circle cx="240" cy="70"  r="11" fill-opacity="0.85"/>
    <circle cx="400" cy="120" r="9"  fill-opacity="0.6"/>
    <circle cx="150" cy="240" r="11" fill-opacity="0.85"/>
    <circle cx="310" cy="220" r="12" fill-opacity="0.9"/>
    <circle cx="410" cy="300" r="9"  fill-opacity="0.6"/>
    <circle cx="90"  cy="380" r="9"  fill-opacity="0.6"/>
    <circle cx="250" cy="390" r="11" fill-opacity="0.85"/>
    <circle cx="390" cy="410" r="8"  fill-opacity="0.55"/>
  </g>
</svg>
