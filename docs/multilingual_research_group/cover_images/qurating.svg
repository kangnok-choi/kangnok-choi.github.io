<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="qurating-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="1" stop-color="#dbe6f7"/>
    </linearGradient>
    <pattern id="qurating-dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e4ea3" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="600" height="360" fill="url(#qurating-bg)"/>
  <rect width="600" height="360" fill="url(#qurating-dots)"/>

  <!-- left: pairwise judgment  A ≻ B -->
  <g>
    <!-- doc A -->
    <g transform="translate(60, 92)">
      <rect width="96" height="70" rx="5" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.55" stroke-width="1.3"/>
      <g fill="#1e4ea3" fill-opacity="0.35">
        <rect x="12" y="14" width="72" height="5" rx="2.5"/>
        <rect x="12" y="26" width="60" height="5" rx="2.5"/>
        <rect x="12" y="38" width="68" height="5" rx="2.5"/>
        <rect x="12" y="50" width="44" height="5" rx="2.5"/>
      </g>
      <text x="86" y="20" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#1e4ea3" text-anchor="middle">A</text>
    </g>
    <!-- doc B -->
    <g transform="translate(60, 198)">
      <rect width="96" height="70" rx="5" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.55" stroke-width="1.3"/>
      <g fill="#1e4ea3" fill-opacity="0.35">
        <rect x="12" y="14" width="66" height="5" rx="2.5"/>
        <rect x="12" y="26" width="72" height="5" rx="2.5"/>
        <rect x="12" y="38" width="52" height="5" rx="2.5"/>
        <rect x="12" y="50" width="64" height="5" rx="2.5"/>
      </g>
      <text x="86" y="20" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#1e4ea3" text-anchor="middle">B</text>
    </g>
    <!-- judgment between the pair -->
    <text x="108" y="187" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" fill="#1e4ea3" text-anchor="middle">&#8827;</text>
    <text x="108" y="292" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e4ea3" fill-opacity="0.6" text-anchor="middle">p(A&#8827;B)</text>
  </g>

  <!-- flow: judgments -> scores -> sampled corpus -->
  <g fill="none" stroke="#1e4ea3" stroke-width="1.4" stroke-opacity="0.6" stroke-linecap="round">
    <path d="M 172 180 Q 250 180 302 180"/>
  </g>
  <polygon points="302,174 314,180 302,186" fill="#1e4ea3" fill-opacity="0.7"/>
  <text x="242" y="168" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e4ea3" fill-opacity="0.6" text-anchor="middle">s(t), &#964;</text>

  <!-- right: corpus grid, opacity = quality score; outlined cells = τ-sampled picks -->
  <g transform="translate(334, 92)">
    <!-- row 1 -->
    <rect x="0"   y="0" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.80" stroke="#1e4ea3" stroke-width="2"/>
    <rect x="46"  y="0" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.12"/>
    <rect x="92"  y="0" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.55"/>
    <rect x="138" y="0" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.70" stroke="#1e4ea3" stroke-width="2"/>
    <rect x="184" y="0" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.08"/>
    <!-- row 2 -->
    <rect x="0"   y="46" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.18"/>
    <rect x="46"  y="46" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.60" stroke="#1e4ea3" stroke-width="2"/>
    <rect x="92"  y="46" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.10"/>
    <rect x="138" y="46" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.28"/>
    <rect x="184" y="46" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.75" stroke="#1e4ea3" stroke-width="2"/>
    <!-- row 3 -->
    <rect x="0"   y="92" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.50"/>
    <rect x="46"  y="92" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.06"/>
    <!-- mid-quality doc still sampled: the τ randomness -->
    <rect x="92"  y="92" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.30" stroke="#1e4ea3" stroke-width="2" stroke-dasharray="4 3"/>
    <rect x="138" y="92" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.14"/>
    <rect x="184" y="92" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.40"/>
    <!-- row 4 -->
    <rect x="0"   y="138" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.10"/>
    <rect x="46"  y="138" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.85" stroke="#1e4ea3" stroke-width="2"/>
    <rect x="92"  y="138" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.22"/>
    <rect x="138" y="138" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.08"/>
    <rect x="184" y="138" width="38" height="38" rx="4" fill="#1e4ea3" fill-opacity="0.45"/>
  </g>
  <text x="445" y="292" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e4ea3" fill-opacity="0.6" text-anchor="middle">&#964;-sampling</text>
</svg>
