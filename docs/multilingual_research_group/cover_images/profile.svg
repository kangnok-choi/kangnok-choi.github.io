<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mrgpbg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="1" stop-color="#dbe6f7"/>
    </linearGradient>
    <pattern id="mrgpdots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e4ea3" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="480" height="480" fill="url(#mrgpbg)"/>
  <rect width="480" height="480" fill="url(#mrgpdots)"/>

  <!-- language tokens at the four corners -->
  <g font-family="JetBrains Mono, monospace" font-weight="600" fill="#1e4ea3">
    <g transform="translate(90, 90)">
      <rect x="-24" y="-20" width="48" height="36" rx="4" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.5"/>
      <text x="0" y="7" text-anchor="middle" font-size="20">가</text>
    </g>
    <g transform="translate(390, 90)">
      <rect x="-24" y="-20" width="48" height="36" rx="4" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.5"/>
      <text x="0" y="7" text-anchor="middle" font-size="20">A</text>
    </g>
    <g transform="translate(90, 390)">
      <rect x="-24" y="-20" width="48" height="36" rx="4" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.5"/>
      <text x="0" y="7" text-anchor="middle" font-size="20">中</text>
    </g>
    <g transform="translate(390, 390)">
      <rect x="-24" y="-20" width="48" height="36" rx="4" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.5"/>
      <text x="0" y="7" text-anchor="middle" font-size="20">あ</text>
    </g>
  </g>

  <!-- lines converging to shared hub -->
  <g fill="none" stroke="#1e4ea3" stroke-width="1.3" stroke-opacity="0.45" stroke-linecap="round">
    <path d="M 118 108 Q 190 190 218 222"/>
    <path d="M 362 108 Q 290 190 262 222"/>
    <path d="M 118 372 Q 190 290 218 258"/>
    <path d="M 362 372 Q 290 290 262 258"/>
  </g>

  <!-- shared hub as an open ring (text sits over center) -->
  <g transform="translate(240, 240)" fill="none" stroke="#1e4ea3">
    <circle r="52" stroke-opacity="0.45" stroke-width="1.4"/>
    <circle r="30" stroke-opacity="0.7" stroke-width="2"/>
  </g>
</svg>
