<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="mlbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="1" stop-color="#dbe6f7"/>
    </linearGradient>
    <pattern id="mldots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e4ea3" fill-opacity="0.08"/>
    </pattern>
    <radialGradient id="hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#1e4ea3" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#1e4ea3" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#1e4ea3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="240" fill="url(#mlbg)"/>
  <rect width="1200" height="240" fill="url(#mldots)"/>

  <!-- input language tokens (left cluster) -->
  <g font-family="JetBrains Mono, monospace" font-weight="600" fill="#1e4ea3">
    <g transform="translate(640, 50)">
      <rect x="-22" y="-18" width="44" height="32" rx="3" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.5"/>
      <text x="0" y="6" text-anchor="middle" font-size="18">가</text>
    </g>
    <g transform="translate(640, 100)">
      <rect x="-22" y="-18" width="44" height="32" rx="3" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.5"/>
      <text x="0" y="6" text-anchor="middle" font-size="18">A</text>
    </g>
    <g transform="translate(640, 150)">
      <rect x="-22" y="-18" width="44" height="32" rx="3" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.5"/>
      <text x="0" y="6" text-anchor="middle" font-size="18">中</text>
    </g>
    <g transform="translate(640, 200)">
      <rect x="-22" y="-18" width="44" height="32" rx="3" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.5"/>
      <text x="0" y="6" text-anchor="middle" font-size="18">あ</text>
    </g>
  </g>

  <!-- converging lines from tokens → shared hub -->
  <g fill="none" stroke="#1e4ea3" stroke-width="1.1" stroke-opacity="0.55" stroke-linecap="round">
    <path d="M 665 50  Q 780 80  870 120"/>
    <path d="M 665 100 Q 780 110 870 120"/>
    <path d="M 665 150 Q 780 130 870 120"/>
    <path d="M 665 200 Q 780 160 870 120"/>
  </g>

  <!-- shared latent hub -->
  <g transform="translate(870, 120)">
    <circle r="64" fill="url(#hub)"/>
    <circle r="22" fill="#1e4ea3"/>
    <circle r="22" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
  </g>

  <!-- diverging lines : shared rep projects back to language outputs -->
  <g fill="none" stroke="#1e4ea3" stroke-width="1.1" stroke-opacity="0.4" stroke-linecap="round" stroke-dasharray="3 4">
    <path d="M 892 120 Q 1020 80  1100 60"/>
    <path d="M 892 120 Q 1020 105 1100 105"/>
    <path d="M 892 120 Q 1020 135 1100 150"/>
    <path d="M 892 120 Q 1020 165 1100 195"/>
  </g>

  <!-- output token marks (small dots) -->
  <g fill="#1e4ea3" fill-opacity="0.55">
    <circle cx="1102" cy="60"  r="4"/>
    <circle cx="1102" cy="105" r="4"/>
    <circle cx="1102" cy="150" r="4"/>
    <circle cx="1102" cy="195" r="4"/>
  </g>

  <!-- subtle label near hub -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#1e4ea3" fill-opacity="0.55" letter-spacing="2">
    <text x="870" y="208" text-anchor="middle">SHARED LATENT</text>
  </g>
</svg>
