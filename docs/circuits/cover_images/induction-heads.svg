<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafbfd"/>
      <stop offset="1" stop-color="#e8eef9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg2)"/>

  <!-- sequence A B C D A B C D with A B repetition highlighted -->
  <g transform="translate(60, 110)" font-family="JetBrains Mono, monospace" fill="#1e4ea3">
    <!-- tokens line -->
    <g font-size="20" font-weight="600">
      <text x="0"   y="0">A</text>
      <text x="40"  y="0" fill-opacity="0.4">B</text>
      <text x="80"  y="0" fill-opacity="0.4">C</text>
      <text x="120" y="0" fill-opacity="0.4">D</text>
      <text x="170" y="0">A</text>
      <text x="210" y="0" font-weight="700">?</text>
    </g>
    <!-- arrows -->
    <g fill="none" stroke="#1e4ea3" stroke-width="1.2" stroke-linecap="round">
      <!-- arrow from second A back to first A -->
      <path d="M 175 -10 Q 90 -50 8 -10" stroke-opacity="0.8"/>
      <polygon points="8,-10 14,-14 14,-6" fill="#1e4ea3"/>
      <!-- arrow forward from first A to next-token B -->
      <path d="M 8 8 Q 24 38 40 14" stroke-opacity="0.5" stroke-dasharray="2 3"/>
      <polygon points="40,14 36,10 44,10" fill="#1e4ea3" fill-opacity="0.5"/>
      <!-- arrow from B up to ? -->
      <path d="M 48 -2 Q 130 -60 215 -8" stroke-opacity="0.8"/>
      <polygon points="215,-8 209,-12 209,-4" fill="#1e4ea3"/>
    </g>
    <!-- labels -->
    <g font-size="9" fill="#1e4ea3" fill-opacity="0.7" letter-spacing="1">
      <text x="50"  y="-50">match prev token</text>
      <text x="60"  y="40">copy next →</text>
      <text x="120" y="-60" font-weight="600">predict B</text>
    </g>
  </g>

  <!-- mini attention matrix in bottom-right -->
  <g transform="translate(420, 230)">
    <g fill="#1e4ea3" fill-opacity="0.1">
      <rect x="0"  y="0"  width="14" height="14"/>
      <rect x="0"  y="18" width="14" height="14"/><rect x="18" y="18" width="14" height="14"/>
      <rect x="0"  y="36" width="14" height="14"/><rect x="18" y="36" width="14" height="14"/><rect x="36" y="36" width="14" height="14"/>
      <rect x="0"  y="54" width="14" height="14"/><rect x="18" y="54" width="14" height="14"/><rect x="36" y="54" width="14" height="14"/><rect x="54" y="54" width="14" height="14"/>
      <rect x="0"  y="72" width="14" height="14"/><rect x="18" y="72" width="14" height="14"/><rect x="36" y="72" width="14" height="14"/><rect x="54" y="72" width="14" height="14"/><rect x="72" y="72" width="14" height="14"/>
    </g>
    <g fill="#1e4ea3" fill-opacity="0.95">
      <rect x="0"  y="18" width="14" height="14"/>
      <rect x="18" y="36" width="14" height="14"/>
      <rect x="36" y="54" width="14" height="14"/>
      <rect x="54" y="72" width="14" height="14"/>
    </g>
  </g>
</svg>
