<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dpbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="1" stop-color="#dbe6f7"/>
    </linearGradient>
    <pattern id="dpdots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e4ea3" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="240" fill="url(#dpbg)"/>
  <rect width="1200" height="240" fill="url(#dpdots)"/>

  <!-- dependency arcs over a token row (right half) -->
  <g fill="none" stroke="#1e4ea3" stroke-linecap="round">
    <path d="M 780 178 Q 900 40  1020 178" stroke-width="1.4" stroke-opacity="0.55"/>
    <path d="M 660 186 Q 720 118 780 186" stroke-width="1.3" stroke-opacity="0.5"/>
    <path d="M 780 186 Q 840 100 900 186" stroke-width="1.3" stroke-opacity="0.5"/>
    <path d="M 1020 186 Q 1080 118 1140 186" stroke-width="1.3" stroke-opacity="0.5"/>
    <path d="M 900 186 Q 960 130 1020 186" stroke-width="1.3" stroke-opacity="0.5"/>
  </g>
  <g fill="#1e4ea3" fill-opacity="0.6">
    <path d="M 660 186 l 6 -9 h -12 z"/>
    <path d="M 900 186 l 6 -9 h -12 z"/>
    <path d="M 1020 178 l 6 -9 h -12 z"/>
    <path d="M 1140 186 l 6 -9 h -12 z"/>
  </g>
  <!-- token boxes -->
  <g>
    <g transform="translate(660, 196)"><rect x="-22" y="0" width="44" height="30" rx="4" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.55"/></g>
    <g transform="translate(780, 196)"><rect x="-22" y="0" width="44" height="30" rx="4" fill="#1e4ea3" fill-opacity="0.85"/></g>
    <g transform="translate(900, 196)"><rect x="-22" y="0" width="44" height="30" rx="4" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.55"/></g>
    <g transform="translate(1020, 196)"><rect x="-22" y="0" width="44" height="30" rx="4" fill="#1e4ea3" fill-opacity="0.85"/></g>
    <g transform="translate(1140, 196)"><rect x="-22" y="0" width="44" height="30" rx="4" fill="#ffffff" stroke="#1e4ea3" stroke-opacity="0.55"/></g>
  </g>
</svg>
