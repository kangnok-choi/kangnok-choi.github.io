{% extends "base.html" %}

{% block extrahead %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
{% endblock %}

{% block scripts %}
  {{ super() }}
  {# 좌상단 사이트 제목("최강녹") 클릭 시 홈으로 이동 #}
  <script>
    document$.subscribe(function () {
      var logo  = document.querySelector(".md-header__button.md-logo");
      var title = document.querySelector(".md-header__title");
      if (!logo || !title || title.hasAttribute("data-home-link")) return;
      title.setAttribute("data-home-link", "");
      title.style.cursor = "pointer";
      title.addEventListener("click", function () { logo.click(); });
    });
  </script>
{% endblock %}
